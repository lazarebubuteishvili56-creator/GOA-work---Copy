<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Neon Space Runner — NPC HP Tiers</title>
<style>
  :root{--bg:#05060a;--neon1:#00f6ff;--neon2:#ff3d81;--accent:#7cff6b;--glass:rgba(255,255,255,0.04)}
  html,body{height:100%;margin:0;background:linear-gradient(180deg,#02030a 0%, #05060a 100%);font-family:Inter,system-ui,Segoe UI,Roboto,Arial;color:#dff7ff}
  #gameWrap{display:flex;align-items:center;justify-content:center;height:100%;padding:20px;box-sizing:border-box;}
  canvas{background:transparent;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.02);}
  .ui{position:fixed;left:20px;top:20px;color:#cfefff;font-size:14px;backdrop-filter:blur(6px);
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:10px;border-radius:10px;
    box-shadow:0 6px 20px rgba(0,0,0,0.5)}
  .ui .big{font-size:18px;font-weight:700;color:var(--neon1)}
  .controls{position:fixed;right:18px;bottom:18px;display:flex;gap:10px;align-items:center}
  .btn{width:72px;height:72px;border-radius:14px;background:linear-gradient(180deg,var(--glass),rgba(255,255,255,0.02));
    display:flex;align-items:center;justify-content:center;color:#e6f9ff;font-weight:700;font-size:18px;box-shadow:0 8px 30px rgba(0,0,0,0.6)}
  .btn.shoot{width:92px;height:92px;border-radius:18px;background:linear-gradient(180deg,var(--neon2),#ff2b6b);font-size:20px}
  .footer{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;color:#9fbfdc;font-size:12px}
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .centerCard{pointer-events:auto;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:18px;border-radius:12px;color:#dff7ff;box-shadow:0 12px 40px rgba(0,0,0,0.6);min-width:320px}
  .row{display:flex;gap:8px;align-items:center}
  .shopItem{display:flex;justify-content:space-between;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02);margin-bottom:8px}
  .small{font-size:13px;color:#bfeeff}
  .skinPreview{width:36px;height:36px;border-radius:8px;display:inline-block;margin-right:8px;vertical-align:middle}
  @media(max-width:700px){.ui{left:12px;top:12px;font-size:13px}.btn{width:60px;height:60px}.btn.shoot{width:78px;height:78px}}
</style>
</head>
<body>
<div id="gameWrap"><canvas id="c" width="900" height="600"></canvas></div>

<div class="ui" id="hud">
  <div class="big" id="score">Score 0</div>
  <div id="info">Level 1 • Lives 3 • Power 0</div>
  <div class="small" id="coins">Coins: 0</div>
  <div class="small" id="gunInfo">Gun: Basic</div>
</div>

<div class="controls" id="controls" aria-hidden="true">
  <div class="btn" id="left">◀</div>
  <div class="btn" id="right">▶</div>
  <div class="btn shoot" id="shoot">FIRE</div>
</div>

<div class="footer">Neon Space Runner — NPC HP Tiers</div>

<div class="overlay" id="overlay">
  <div class="centerCard" id="menu">
    <h2 style="margin:0 0 8px 0;color:var(--neon1)">Neon Space Runner</h2>
    <div style="opacity:0.9;margin-bottom:12px">NPC HP tiers set: small 75, medium 150, big 250, boss 350–400.</div>

    <div style="margin-bottom:8px">
      <label class="small">Difficulty</label>
      <select id="difficulty" style="width:100%;padding:8px;border-radius:8px;margin-top:6px">
        <option value="easy">Easy</option>
        <option value="normal" selected>Normal</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
        <option value="impossible">Impossible</option>
        <option value="god">God</option>
        <option value="kill">Kill Mode</option>
      </select>
    </div>

    <div style="margin-bottom:12px">
      <label class="small">Select Gun</label>
      <select id="gunSelect" style="width:100%;padding:8px;border-radius:8px;margin-top:6px">
        <option value="basic">Basic</option>
        <option value="burst">Burst</option>
        <option value="laser">Laser</option>
        <option value="spread">Spread</option>
        <option value="godkiller">Godkiller</option>
      </select>
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button id="startBtn" style="background:var(--neon1);border:none;padding:8px 12px;border-radius:8px;font-weight:700;cursor:pointer">Start</button>
      <button id="openShop" style="background:transparent;border:1px solid rgba(255,255,255,0.06);padding:8px 12px;border-radius:8px;color:#cfefff;cursor:pointer">Shop</button>
    </div>
  </div>
</div>

<div class="overlay" id="shopOverlay" style="display:none;align-items:flex-start;padding-top:40px">
  <div class="centerCard" style="width:520px" id="shopCard">
    <h3 style="margin:0 0 8px 0;color:var(--neon2)">Shop & Inventory</h3>
    <div id="shopContent" style="max-height:420px;overflow:auto"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button id="closeShop" style="background:var(--neon1);border:none;padding:8px 12px;border-radius:8px;font-weight:700;cursor:pointer">Close</button>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: true });
  let W = canvas.width, H = canvas.height;

  const KEY = { HIGH:'nsr_high_hp', COINS:'nsr_coins_hp', INVENTORY:'nsr_inv_hp', SKIN:'nsr_skin_hp', DIFF:'nsr_diff_hp', GUN:'nsr_gun_hp' };

  let running=false, last=0, dt=0;
  let score=0, level=1, lives=3, power=0;
  let high = parseInt(localStorage.getItem(KEY.HIGH) || '0',10);
  let coins = parseInt(localStorage.getItem(KEY.COINS) || '0',10);
  let inventory = JSON.parse(localStorage.getItem(KEY.INVENTORY) || '[]');
  let selectedSkin = localStorage.getItem(KEY.SKIN) || 'default';
  let difficulty = localStorage.getItem(KEY.DIFF) || 'normal';
  let currentGun = localStorage.getItem(KEY.GUN) || 'basic';

  const player = { x: W/2, y: H - 80, r: 18, vx: 0, speed: 420, cooldown: 0, color: '#00f6ff', skin: selectedSkin };

  const bullets = [], enemies = [], particles = [], powerups = [];
  let boss = null, bossTimer = 0;
  let screenShake = 0;

  const hudScore = document.getElementById('score');
  const hudInfo = document.getElementById('info');
  const hudCoins = document.getElementById('coins');
  const hudGun = document.getElementById('gunInfo');
  const overlay = document.getElementById('overlay');
  const menu = document.getElementById('menu');
  const shopOverlay = document.getElementById('shopOverlay');
  const shopContent = document.getElementById('shopContent');

  const keys = {}; let touchX = null;
  window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.key===' '){ e.preventDefault(); }});
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
  const leftBtn = document.getElementById('left'), rightBtn = document.getElementById('right'), shootBtn = document.getElementById('shoot');
  leftBtn.addEventListener('pointerdown', ()=> keys['arrowleft']=true); leftBtn.addEventListener('pointerup', ()=> keys['arrowleft']=false);
  rightBtn.addEventListener('pointerdown', ()=> keys['arrowright']=true); rightBtn.addEventListener('pointerup', ()=> keys['arrowright']=false);
  shootBtn.addEventListener('pointerdown', ()=> keys[' ']=true); shootBtn.addEventListener('pointerup', ()=> keys[' ']=false);
  canvas.addEventListener('pointerdown', e => { touchX = e.clientX; });
  canvas.addEventListener('pointermove', e => { if(touchX!==null){ const dx = e.clientX - touchX; player.x += dx * 0.6; touchX = e.clientX; }});
  canvas.addEventListener('pointerup', ()=> touchX = null);
  canvas.addEventListener('pointercancel', ()=> touchX = null);

  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioCtx();
  let musicOsc = null;
  function playTone(freq,type='sine',dur=0.12,vol=0.08){
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq; g.gain.value = vol;
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
  }
  function playBeep(kind='hit'){
    if(!audioCtx) return;
    if(kind==='shoot') playTone(1200,'square',0.06,0.06);
    else if(kind==='hit') playTone(320,'sawtooth',0.12,0.08);
    else if(kind==='power') playTone(880,'sine',0.18,0.09);
    else if(kind==='boss') playTone(220,'sine',0.4,0.12);
    else playTone(600,'triangle',0.08,0.06);
  }
  function startMusic(){ if(musicOsc) return; musicOsc = audioCtx.createOscillator(); const g = audioCtx.createGain(); musicOsc.type='sine'; musicOsc.frequency.value=60; g.gain.value=0.02; musicOsc.connect(g); g.connect(audioCtx.destination); musicOsc.start(); }
  function stopMusic(){ if(musicOsc){ musicOsc.stop(); musicOsc=null; } }

  const DIFFICULTY = {
    easy:{enemyRate:0.6,enemyHP:1,bossHP:80,coinMult:1},
    normal:{enemyRate:1.0,enemyHP:1.2,bossHP:120,coinMult:1},
    medium:{enemyRate:1.4,enemyHP:1.5,bossHP:180,coinMult:1.2},
    hard:{enemyRate:1.9,enemyHP:1.9,bossHP:260,coinMult:1.4},
    impossible:{enemyRate:2.6,enemyHP:2.6,bossHP:380,coinMult:1.6},
    god:{enemyRate:3.6,enemyHP:3.6,bossHP:600,coinMult:2.0},
    kill:{enemyRate:5.0,enemyHP:6.0,bossHP:1200,coinMult:3.0}
  };

  // Gun damages kept as previously set
  const GUNS = {
    basic:{name:'Basic',cooldown:0.18,bullets:1,spread:0,dmg:80, color:'#7cff6b', muzzle:6, sprite:{w:28,h:8,offsetY:-6}},
    burst:{name:'Burst',cooldown:0.5,bullets:3,spread:6,dmg:150, color:'#00f6ff', muzzle:8, sprite:{w:34,h:10,offsetY:-8}},
    laser:{name:'Laser',cooldown:0.28,bullets:1,spread:0,dmg:300, color:'#ff3d81', muzzle:4, sprite:{w:40,h:6,offsetY:-10}},
    spread:{name:'Spread',cooldown:0.32,bullets:5,spread:18,dmg:400, color:'#ffd36b', muzzle:10, sprite:{w:44,h:12,offsetY:-8}},
    godkiller:{name:'Godkiller',cooldown:0.12,bullets:1,spread:0,dmg:500, color:'#ffffff', muzzle:14, sprite:{w:56,h:14,offsetY:-12}}
  };

  const DECORATIONS = [
    {id:'glow_ring',name:'Glow Ring',rarity:'common',chance:0.45,value:20},
    {id:'winglets',name:'Winglets',rarity:'uncommon',chance:0.28,value:60},
    {id:'neon_trail',name:'Neon Trail',rarity:'rare',chance:0.15,value:180},
    {id:'crown',name:'Crown',rarity:'epic',chance:0.08,value:500},
    {id:'void_core',name:'Void Core',rarity:'legendary',chance:0.03,value:2000}
  ];

  const SHOP_ITEMS = [
    {id:'skin_default',type:'skin',name:'Default',price:0,skin:'default'},
    {id:'skin_azure',type:'skin',name:'Azure',price:300,skin:'azure'},
    {id:'skin_pink',type:'skin',name:'Neon Pink',price:450,skin:'pink'},
    {id:'skin_gold',type:'skin',name:'Gold',price:1200,skin:'gold'},
    {id:'dec_glow',type:'decoration',name:'Glow Ring',price:80,decoration:'glow_ring'},
    {id:'dec_wing',type:'decoration',name:'Winglets',price:220,decoration:'winglets'},
    {id:'gun_burst',type:'gun',name:'Burst Gun',price:1200,gun:'burst'},
    {id:'gun_laser',type:'gun',name:'Laser Gun',price:2500,gun:'laser'},
    {id:'gun_spread',type:'gun',name:'Spread Gun',price:1800,gun:'spread'},
    {id:'gun_godkiller',type:'gun',name:'Godkiller Gun',price:15000,gun:'godkiller'}
  ];

  function rand(a,b){return a + Math.random()*(b-a);}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function dist(a,b,c,d){return Math.hypot(a-c,b-d);}

  function saveAll(){ localStorage.setItem(KEY.HIGH,String(high)); localStorage.setItem(KEY.COINS,String(coins)); localStorage.setItem(KEY.INVENTORY,JSON.stringify(inventory)); localStorage.setItem(KEY.SKIN,selectedSkin); localStorage.setItem(KEY.DIFF,difficulty); localStorage.setItem(KEY.GUN,currentGun); }

  // NPC HP tiers: small 75, medium 150, big 250. Boss HP random 350-400, scaled by level.
  function spawnEnemy(){
    const cfg = DIFFICULTY[difficulty] || DIFFICULTY.normal;
    const size = rand(14,36);
    const x = rand(size, W-size);
    const y = -size;
    const speed = rand(60 + level*6, 120 + level*18) * cfg.enemyRate;
    const typeRoll = Math.random();
    const type = typeRoll < 0.12 ? 'shooter' : (typeRoll < 0.22 ? 'zig' : 'basic');

    // Determine size category by visual size
    let baseHp;
    if(size < 20) baseHp = 75;        // small NPC
    else if(size < 30) baseHp = 150;  // medium NPC
    else baseHp = 250;                // big NPC

    // Scale with level slightly so later levels are tougher
    const hp = Math.max(1, Math.round(baseHp * (1 + (level-1)*0.12)));
    enemies.push({x,y,size,speed,type,angle:0,shootTimer:rand(1,3),hp,baseHp});
  }

  function spawnBoss(){
    const cfg = DIFFICULTY[difficulty] || DIFFICULTY.normal;
    // boss base HP random between 350 and 400, then scale with level
    const base = Math.round(rand(350,400));
    const hp = Math.max(1, Math.round(base * (1 + (level-1)*0.12)));
    boss = { x: W/2, y: -120, size: 80, hp, baseHp: hp, phase:0, timer:0, vx: 80, pattern: Math.random() < 0.5 ? 'sweep' : 'bomb' };
    playBeep('boss');
  }

  function spawnPower(x,y){ const kind = Math.random() < 0.6 ? 'score' : (Math.random() < 0.5 ? 'life' : 'power'); powerups.push({x,y,kind,vy:60}); }
  function shoot(x,y,dx,dy,owner='player',dmg=1, gunKey='basic'){ bullets.push({x,y,dx,dy,owner,life:2,dmg,gun:gunKey, trail:[]}); }
  function explode(x,y,color,amount=18){ for(let i=0;i<amount;i++) particles.push({x,y,vx:rand(-220,220),vy:rand(-220,220),life:rand(0.4,1.2),size:rand(1,3),color}); }

  function rollDecoration(){ const r = Math.random(); let acc = 0; for(const d of DECORATIONS){ acc += d.chance; if(r <= acc) return d; } return DECORATIONS[0]; }

  function awardBossRewards(bossObj){
    const cfg = DIFFICULTY[difficulty] || DIFFICULTY.normal;
    const base = Math.round(500 + level * 120);
    const gained = Math.round(base * cfg.coinMult);
    coins += gained;
    const drops = [];
    const dropCount = 1 + Math.floor(Math.random()*2);
    for(let i=0;i<dropCount;i++){
      if(Math.random() < 0.85){
        const dec = rollDecoration();
        inventory.push({ type:'decoration', id:dec.id, name:dec.name, rarity:dec.rarity, value:dec.value });
        drops.push(dec);
      }
    }
    if(Math.random() < 0.12){ inventory.push({ type:'ability', id:'nuke', name:'Nuke', value:0 }); drops.push({ name:'Nuke Ability', rarity:'rare' }); }
    playBeep('power');
    return { coins:gained, drops };
  }

  function addMuzzleFlash(x,y,color,size=12,life=0.08){ particles.push({x,y,vx:rand(-20,20),vy:rand(-40,-10),life,size,color, muzzle:true}); }

  function update(t){
    if(!running) return;
    dt = Math.min((t - last)/1000, 0.05);
    last = t;

    const cfg = DIFFICULTY[difficulty] || DIFFICULTY.normal;
    if(Math.random() < dt * (0.8 * cfg.enemyRate + level*0.01)) spawnEnemy();

    bossTimer += dt;
    if(!boss && (level % 6 === 0 && bossTimer > 1.2) && Math.random() < 0.6){ spawnBoss(); bossTimer = 0; }
    else if(!boss && bossTimer > 40 && Math.random() < 0.02){ spawnBoss(); bossTimer = 0; }

    let move = 0;
    if(keys['arrowleft'] || keys['a']) move -= 1;
    if(keys['arrowright'] || keys['d']) move += 1;
    player.vx = move * player.speed;
    player.x += player.vx * dt;
    player.x = clamp(player.x, player.r, W - player.r);

    const gun = GUNS[currentGun] || GUNS.basic;
    player.cooldown -= dt;
    if((keys[' '] || keys['enter']) && player.cooldown <= 0){
      if(!isGunOwned(currentGun)){ alert('You must buy this gun in the shop first.'); document.getElementById('gunSelect').value = 'basic'; currentGun = 'basic'; return; }
      const spreadCount = gun.bullets;
      for(let i=0;i<spreadCount;i++){
        const angle = ((i - (spreadCount-1)/2) * (gun.spread * Math.PI/180));
        const speed = 520;
        const dx = Math.sin(angle)*40;
        const dy = -speed;
        const offset = (i - (spreadCount-1)/2) * 8;
        shoot(player.x + offset, player.y - player.r - 6, dx, dy, 'player', gun.dmg, currentGun);
      }
      player.cooldown = gun.cooldown;
      playBeep('shoot');
      addMuzzleFlash(player.x, player.y + gun.sprite.offsetY, gun.color, gun.muzzle, 0.08);
      for(let i=0;i<6;i++) particles.push({x:player.x + rand(-6,6), y:player.y - player.r, vx:rand(-40,40), vy:rand(-120,-60), life:0.2, size:rand(1,2), color:'#fff'});
    }

    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      b.x += b.dx * dt;
      b.y += b.dy * dt;
      b.life -= dt;
      b.trail.push({x:b.x, y:b.y, life:0.25, color: GUNS[b.gun]?.color || '#fff'});
      if(b.trail.length > 8) b.trail.shift();
      if(b.y < -40 || b.y > H+40 || b.x < -80 || b.x > W+80 || b.life <= 0) bullets.splice(i,1);
    }

    for(let i=enemies.length-1;i>=0;i--){
      const e = enemies[i];
      e.y += e.speed * dt;
      if(e.type === 'zig') e.x += Math.sin((t/300)+i)*60*dt;
      if(e.type === 'shooter'){
        e.shootTimer -= dt;
        if(e.shootTimer <= 0){
          e.shootTimer = rand(1.2,2.6);
          const angle = Math.atan2(player.y - e.y, player.x - e.x);
          shoot(e.x, e.y, Math.cos(angle)*180, Math.sin(angle)*180, 'enemy', 1);
        }
      }
      if(dist(e.x,e.y,player.x,player.y) < e.size + player.r){
        explode(player.x, player.y, '#ff6b6b', 26);
        lives -= 1;
        enemies.splice(i,1);
        playBeep('hit');
        if(lives <= 0) gameOver();
        continue;
      }
      if(e.y > H + 80) { enemies.splice(i,1); score += Math.floor(5 + level*0.5); }
    }

    if(boss){
      boss.timer += dt;
      if(boss.y < 120) boss.y += 80 * dt;
      else {
        if(boss.pattern === 'sweep'){
          boss.x += boss.vx * dt;
          if(boss.x < boss.size || boss.x > W - boss.size) boss.vx *= -1;
          if(boss.timer > 1.2){
            boss.timer = 0;
            const shots = 8 + Math.floor(level/4);
            for(let i=0;i<shots;i++){ const a = (i / shots) * Math.PI*2; shoot(boss.x + Math.cos(a)*40, boss.y + Math.sin(a)*40, Math.cos(a)*120, Math.sin(a)*120, 'enemy', 1.2); }
          }
        } else {
          if(boss.timer > 0.9){ boss.timer = 0; const angle = Math.atan2(player.y - boss.y, player.x - boss.x); shoot(boss.x, boss.y, Math.cos(angle)*200, Math.sin(angle)*200, 'enemy', 1.6); }
          boss.x += Math.sin(t/500) * 40 * dt;
        }
      }
      if(dist(boss.x,boss.y,player.x,player.y) < boss.size + player.r){ explode(player.x, player.y, '#ff6b6b', 40); lives -= 1; playBeep('hit'); if(lives <= 0) gameOver(); }
      if(boss.hp <= 0){
        const reward = awardBossRewards(boss);
        score += Math.round(800 + level*120);
        explode(boss.x, boss.y, '#ffb86b', 60);
        boss = null; level += 1; playBeep('power');
        screenShake = 12;
      }
    }

    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      if(b.owner !== 'player') continue;
      if(boss && dist(b.x,b.y,boss.x,boss.y) < boss.size + 6){
        boss.hp -= b.dmg;
        explode(b.x,b.y,'#ffb86b',6);
        bullets.splice(i,1);
        score += Math.floor(8 + level*0.6);
        screenShake = Math.min(18, screenShake + 6);
        continue;
      }
      for(let j=enemies.length-1;j>=0;j--){
        const e = enemies[j];
        if(dist(b.x,b.y,e.x,e.y) < e.size + 6){
          e.hp -= b.dmg;
          const col = GUNS[b.gun]?.color || '#7cff6b';
          explode(b.x,b.y,col,6);
          bullets.splice(i,1);
          if(e.hp <= 0){
            score += Math.floor(10 + e.size*0.6 + level*0.8);
            if(Math.random() < 0.12) spawnPower(e.x, e.y);
            const coinGain = Math.round((5 + Math.random()*20) * cfg.coinMult);
            coins += coinGain;
            enemies.splice(j,1);
            playBeep('hit');
            if(Math.random() < 0.06){
              const dec = rollDecoration();
              inventory.push({ type:'decoration', id:dec.id, name:dec.name, rarity:dec.rarity, value:dec.value });
            }
            if(b.gun === 'godkiller'){
              for(let k=0;k<30;k++) particles.push({x:e.x + rand(-e.size,e.size), y:e.y + rand(-e.size,e.size), vx:rand(-300,300), vy:rand(-300,300), life:rand(0.4,1.2), size:rand(2,4), color:'#fff'});
              screenShake = 10;
            }
          }
          break;
        }
      }
    }

    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      if(b.owner === 'enemy' && dist(b.x,b.y,player.x,player.y) < player.r + 6){
        explode(player.x, player.y, '#ff6b6b', 18);
        bullets.splice(i,1);
        lives -= 1;
        playBeep('hit');
        if(lives <= 0) gameOver();
      }
    }

    for(let i=powerups.length-1;i>=0;i--){
      const p = powerups[i];
      p.y += p.vy * dt;
      if(dist(p.x,p.y,player.x,player.y) < 18){
        if(p.kind === 'score') score += 150 + level*10;
        else if(p.kind === 'life') lives = Math.min(5, lives + 1);
        else if(p.kind === 'power') power = Math.min(5, power + 1);
        explode(p.x,p.y,'#7cff6b',10);
        powerups.splice(i,1);
        playBeep('power');
      } else if(p.y > H + 30) powerups.splice(i,1);
    }

    for(let i=particles.length-1;i>=0;i--){
      const q = particles[i];
      q.x += q.vx * dt;
      q.y += q.vy * dt;
      q.vy += 300 * dt;
      q.life -= dt;
      if(q.life <= 0) particles.splice(i,1);
    }

    if(score > level * 1200){ level += 1; lives = Math.min(5, lives + 1); for(let i=0;i<30;i++) particles.push({x:rand(100,W-100), y:rand(80, H/2), vx:rand(-80,80), vy:rand(-80,80), life:rand(0.6,1.6), size:rand(1,3), color:'#ff3d81'}); }

    hudScore.textContent = `Score ${score} • High ${high}`;
    hudInfo.textContent = `Level ${level} • Lives ${lives} • Power ${power}`;
    hudCoins.textContent = `Coins: ${coins}`;
    hudGun.textContent = `Gun: ${GUNS[currentGun].name}`;

    if(Math.random() < dt * 8) particles.push({x:rand(0,W), y:-10, vx:rand(-10,10), vy:rand(20,80), life:rand(1.2,3), size:rand(1,2), color:'#0ff'});

    screenShake = Math.max(0, screenShake - dt * 40);
  }

  function draw(){
    const sx = (Math.random()-0.5) * screenShake;
    const sy = (Math.random()-0.5) * screenShake;
    ctx.setTransform(1,0,0,1,sx,sy);

    ctx.clearRect(-50,-50,W+100,H+100);
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'rgba(2,3,10,0.0)');
    g.addColorStop(1,'rgba(5,6,10,0.6)');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

    for(let i=0;i<60;i++){
      const x = (i*37) % W;
      const y = (i*53 + (Date.now()/30 % H));
      ctx.fillStyle = 'rgba(255,255,255,0.02)';
      ctx.fillRect((x+ (Math.sin(i)*20))%W, y%H, 2,2);
    }

    for(const e of enemies){
      ctx.save(); ctx.translate(e.x,e.y);
      ctx.beginPath(); ctx.fillStyle = e.type==='shooter' ? '#ff3d81' : '#7cff6b';
      ctx.moveTo(0,-e.size); ctx.lineTo(e.size, e.size); ctx.lineTo(-e.size, e.size); ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(-e.size, -e.size-8, e.size*2, 4);
      ctx.fillStyle = '#ffb86b'; ctx.fillRect(-e.size, -e.size-8, (e.hp/e.baseHp)*e.size*2, 4);
      ctx.restore();
    }

    if(boss){
      ctx.save(); ctx.translate(boss.x,boss.y);
      ctx.beginPath(); ctx.fillStyle = '#ff3d81'; ctx.arc(0,0,boss.size,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-boss.size, -boss.size-14, boss.size*2, 8);
      ctx.fillStyle = '#ffd36b'; ctx.fillRect(-boss.size, -boss.size-14, clamp(boss.hp / boss.baseHp,0,1) * boss.size*2, 8);
      ctx.restore();
    }

    for(const b of bullets){
      for(const p of b.trail){
        ctx.beginPath();
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 0.25;
        ctx.fillRect(p.x-2, p.y-2, 4, 4);
        ctx.globalAlpha = 1;
        p.life -= 0.02;
      }
    }

    for(const b of bullets){
      ctx.beginPath();
      ctx.fillStyle = b.owner === 'player' ? (GUNS[b.gun]?.color || 'rgba(124,255,107,0.95)') : 'rgba(255,120,120,0.95)';
      ctx.ellipse(b.x, b.y, 4, 8, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fillRect(b.x-1, b.y-6, 2, 12);
    }

    for(const p of powerups){
      ctx.beginPath();
      ctx.fillStyle = p.kind === 'life' ? '#ffb86b' : (p.kind==='power' ? '#7cff6b' : '#00f6ff');
      ctx.ellipse(p.x, p.y, 10, 10, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fillRect(p.x-6, p.y-1, 12, 2);
    }

    for(const q of particles){
      ctx.beginPath();
      ctx.fillStyle = q.color || '#fff';
      ctx.globalAlpha = Math.max(0, q.life / 1.2);
      if(q.muzzle) ctx.fillRect(q.x - q.size/2, q.y - q.size/2, q.size*2, q.size*0.8);
      else ctx.fillRect(q.x, q.y, q.size, q.size);
      ctx.globalAlpha = 1;
    }

    ctx.save(); ctx.translate(player.x, player.y);
    ctx.beginPath(); ctx.fillStyle = 'rgba(0,246,255,0.06)'; ctx.arc(0,0,40,0,Math.PI*2); ctx.fill();
    if(selectedSkin === 'azure'){ ctx.fillStyle = '#00d4ff'; }
    else if(selectedSkin === 'pink'){ ctx.fillStyle = '#ff4da6'; }
    else if(selectedSkin === 'gold'){ ctx.fillStyle = '#ffd36b'; }
    else ctx.fillStyle = player.color;
    ctx.beginPath(); ctx.moveTo(0,-player.r-6); ctx.lineTo(player.r, player.r+6); ctx.lineTo(0, player.r/2); ctx.lineTo(-player.r, player.r+6); ctx.closePath(); ctx.fill();

    const gunDef = GUNS[currentGun] || GUNS.basic;
    const s = gunDef.sprite;
    ctx.save();
    ctx.translate(0, s.offsetY);
    ctx.fillStyle = gunDef.color;
    ctx.fillRect(-s.w/2, -s.h/2, s.w, s.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.w/2 - 6, -s.h/4, 6, s.h/2);
    ctx.restore();

    const decs = inventory.filter(i => i.type==='decoration').slice(0,3);
    for(let i=0;i<decs.length;i++){
      ctx.beginPath(); ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
      ctx.arc(0, -player.r - 12 - i*6, player.r + 6 + i*6, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();

    ctx.setTransform(1,0,0,1,0,0);
  }

  function gameOver(){
    running = false;
    overlay.style.display = 'flex';
    menu.innerHTML = `<h2 style="margin:0 0 8px 0;color:var(--neon2)">Game Over</h2>
      <div style="opacity:0.9;margin-bottom:12px">Score ${score} • Level ${level}</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button id="restart" style="background:var(--neon1);border:none;padding:8px 12px;border-radius:8px;font-weight:700;cursor:pointer">Restart</button>
        <button id="menuBack" style="background:transparent;border:1px solid rgba(255,255,255,0.06);padding:8px 12px;border-radius:8px;color:#cfefff;cursor:pointer">Menu</button>
      </div>`;
    document.getElementById('restart').addEventListener('click', ()=> { overlay.style.display='none'; startGame(); });
    document.getElementById('menuBack').addEventListener('click', ()=> { overlay.style.display='none'; overlay.style.display='flex'; });
    if(score > high){ high = score; localStorage.setItem(KEY.HIGH, high); hudScore.textContent = `Score ${score} • High ${high}`; }
    saveAll(); stopMusic();
  }

  function startGame(){
    const diffSelect = document.getElementById('difficulty');
    const gunSelect = document.getElementById('gunSelect');
    if(diffSelect) { difficulty = diffSelect.value; localStorage.setItem(KEY.DIFF, difficulty); }
    if(gunSelect) { currentGun = gunSelect.value; localStorage.setItem(KEY.GUN, currentGun); }
    score = 0; level = 1; lives = 3; power = 0;
    bullets.length = enemies.length = particles.length = powerups.length = 0;
    boss = null; bossTimer = 0; screenShake = 0;
    player.x = W/2; player.y = H - 80; player.cooldown = 0;
    running = true; last = performance.now();
    overlay.style.display = 'none';
    startMusic();
    requestAnimationFrame(loop);
  }

  function isGunOwned(gunKey){ if(gunKey === 'basic') return true; return inventory.some(it => it.type === 'gun' && it.gun === gunKey); }

  function openShop(){
    shopContent.innerHTML = '';
    const invHeader = document.createElement('div');
    invHeader.innerHTML = `<div class="small" style="margin-bottom:8px">Coins: <strong>${coins}</strong></div>`;
    shopContent.appendChild(invHeader);

    const shopList = document.createElement('div');
    shopList.innerHTML = '<div class="small" style="margin-bottom:6px">Buy Skins, Decorations & Guns</div>';
    for(const item of SHOP_ITEMS){
      const el = document.createElement('div'); el.className = 'shopItem';
      const left = document.createElement('div');
      left.innerHTML = `<div style="display:flex;align-items:center"><div class="skinPreview" style="background:${item.skin==='azure'?'#00d4ff':item.skin==='pink'?'#ff4da6':item.skin==='gold'?'#ffd36b':'#00f6ff'}"></div><div><div style="font-weight:700">${item.name}</div><div class="small">${item.type}</div></div></div>`;
      const right = document.createElement('div');
      right.innerHTML = `<div style="text-align:right"><div style="font-weight:700">${item.price}¢</div><button data-id="${item.id}" style="margin-top:6px;padding:6px 8px;border-radius:6px;cursor:pointer">Buy</button></div>`;
      el.appendChild(left); el.appendChild(right); shopList.appendChild(el);
    }
    shopContent.appendChild(shopList);

    const invList = document.createElement('div'); invList.style.marginTop = '12px';
    invList.innerHTML = '<div class="small" style="margin-bottom:6px">Inventory (decorations, abilities, guns)</div>';
    if(inventory.length === 0) invList.innerHTML += '<div class="small">Empty</div>';
    for(const it of inventory){
      const row = document.createElement('div'); row.className = 'shopItem';
      row.innerHTML = `<div><div style="font-weight:700">${it.name}</div><div class="small">${it.rarity || it.type}</div></div>
        <div style="text-align:right"><div class="small">Value ${it.value || 0}¢</div><button data-sell="${it.id || it.name}" style="margin-top:6px;padding:6px 8px;border-radius:6px;cursor:pointer">Sell</button></div>`;
      invList.appendChild(row);
    }
    shopContent.appendChild(invList);

    shopContent.querySelectorAll('button[data-id]').forEach(b => b.addEventListener('click', e => {
      const id = e.currentTarget.getAttribute('data-id');
      const item = SHOP_ITEMS.find(s => s.id === id);
      if(!item) return;
      if(coins < item.price){ alert('Not enough coins'); return; }
      coins -= item.price;
      if(item.type === 'skin'){ selectedSkin = item.skin; localStorage.setItem(KEY.SKIN, selectedSkin); }
      if(item.type === 'decoration'){ const dec = DECORATIONS.find(d => d.id === item.decoration); inventory.push({ type:'decoration', id:dec.id, name:dec.name, rarity:dec.rarity, value:dec.value }); }
      if(item.type === 'gun'){ inventory.push({ type:'gun', id:item.id, name:item.name, gun:item.gun, value:item.price }); currentGun = item.gun; localStorage.setItem(KEY.GUN, currentGun); alert(item.name + ' purchased and equipped.'); }
      saveAll(); openShop();
    }));

    shopContent.querySelectorAll('button[data-sell]').forEach(b => b.addEventListener('click', e => {
      const key = e.currentTarget.getAttribute('data-sell');
      const idx = inventory.findIndex(it => (it.id === key) || (it.name === key));
      if(idx === -1) return;
      const it = inventory.splice(idx,1)[0];
      const sellValue = Math.round((it.value || 0) * 0.6);
      coins += sellValue;
      if(it.type === 'gun' && it.gun === 'godkiller'){ if(currentGun === 'godkiller'){ currentGun = 'basic'; document.getElementById('gunSelect').value = 'basic'; } }
      saveAll(); openShop();
    }));

    shopOverlay.style.display = 'flex';
  }

  function loop(t){ update(t); draw(); if(running) requestAnimationFrame(loop); }

  document.getElementById('startBtn').addEventListener('click', ()=> {
    const diff = document.getElementById('difficulty').value;
    const gun = document.getElementById('gunSelect').value;
    difficulty = diff; currentGun = gun;
    localStorage.setItem(KEY.DIFF, difficulty); localStorage.setItem(KEY.GUN, currentGun);
    overlay.style.display = 'none'; startGame();
  });
  document.getElementById('openShop').addEventListener('click', ()=> { openShop(); });
  document.getElementById('closeShop').addEventListener('click', ()=> { shopOverlay.style.display = 'none'; saveAll(); });

  document.getElementById('difficulty').value = difficulty;
  document.getElementById('gunSelect').value = currentGun;

  window.addEventListener('keydown', e => { if(e.key === ' ' && !running && overlay.style.display === 'flex'){ overlay.style.display = 'none'; startGame(); } });

  window.addEventListener('blur', ()=> { if(running){ running = false; overlay.style.display = 'flex'; menu.innerHTML = `<h3 style="margin:0 0 8px 0;color:var(--neon1)">Paused</h3><div style="display:flex;gap:8px;justify-content:flex-end"><button id="resume" style="background:var(--neon1);border:none;padding:8px 12px;border-radius:8px;font-weight:700;cursor:pointer">Resume</button></div>`; document.getElementById('resume').addEventListener('click', ()=> { overlay.style.display='none'; startGame(); }); stopMusic(); } });

  hudCoins.textContent = `Coins: ${coins}`;
  hudGun.textContent = `Gun: ${GUNS[currentGun].name}`;

  (function introGlow(){ const g = ctx.createLinearGradient(0,0,W,H); g.addColorStop(0,'rgba(0,246,255,0.02)'); g.addColorStop(1,'rgba(255,61,129,0.02)'); ctx.fillStyle = g; ctx.fillRect(0,0,W,H); })();

  setInterval(saveAll, 5000);

  function unlockAudio(){ if(audioCtx.state === 'suspended') audioCtx.resume(); window.removeEventListener('pointerdown', unlockAudio); window.removeEventListener('keydown', unlockAudio); }
  window.addEventListener('pointerdown', unlockAudio);
  window.addEventListener('keydown', unlockAudio);

})();
</script>
</body>
</html>
